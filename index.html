<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRBOT BETTING</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1d; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: #25252b; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #fbc02d; margin-bottom: 10px; }
        .balance-box { background: #000; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px solid #444; }
        .amt { font-size: 30px; color: #4caf50; font-weight: bold; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-play { background: #2481cc; color: white; }
        .btn-bet { background: #e53935; color: white; flex: 1; margin: 5px; }
        .btn-high { background: #1e88e5; }
        .dice { font-size: 70px; margin: 20px; }
    </style>
</head>
<body>

<div class="card" id="main-ui">
    <h1>🚀 HRBOT BET</h1>
    <div class="balance-box">
        <div>Baalaansii Kee</div>
        <div class="amt"><span id="bal">0</span> ETB</div>
    </div>

    <div id="deposit-ui">
        <p>Tapha eegaluuf dura qarshii galchaa</p>
        <input type="number" id="dep-amt" placeholder="Hamma (ETB)">
        <button class="btn btn-play" onclick="deposit()">Telebirr-iin Galchi</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div class="dice" id="dice-icon">🎲</div>
        <input type="number" id="bet-amt" placeholder="Qarshii Qabsiisu">
        <div style="display:flex;">
            <button class="btn btn-bet" onclick="play('low')">XIQQAA (1-3)</button>
            <button class="btn btn-bet btn-high" onclick="play('high')">GUDDAA (4-6)</button>
        </div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    let balance = 0;

    function deposit() {
        let a = document.getElementById('dep-amt').value;
        if(a < 10) { tg.showAlert("Minimum 10 ETB galchaa"); return; }
        balance = parseInt(a);
        document.getElementById('bal').innerText = balance;
        document.getElementById('deposit-ui').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
    }

    function play(choice) {
        let b = parseInt(document.getElementById('bet-amt').value);
        if(!b || b > balance) { tg.showAlert("Baalaansiin kee hin ga'u!"); return; }
        
        let res = Math.floor(Math.random() * 6) + 1;
        let icons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        document.getElementById('dice-icon').innerText = icons[res];

        let win = (choice === 'low' && res <= 3) || (choice === 'high' && res >= 4);
        if(win) {
            balance += b;
            tg.showAlert("🎉 Mo'atteetta! +" + b);
        } else {
            balance -= b;
            tg.showAlert("😢 Nyaatamte! -" + b);
        }
        document.getElementById('bal').innerText = balance;
    }
</script>
</body>
</html>
