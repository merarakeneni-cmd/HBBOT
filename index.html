<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRBOT BETTING</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0f3460; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { background: #16213e; border-radius: 20px; padding: 25px; border: 2px solid #e94560; max-width: 400px; margin: auto; }
        .slot-box { display: flex; justify-content: center; background: white; padding: 15px; border-radius: 15px; margin: 20px 0; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .slot { font-size: 50px; width: 80px; color: black; }
        input { width: 85%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; font-size: 18px; text-align: center; color: #333; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-play { background: #e94560; color: white; }
        .btn-play:active { background: #c0392b; transform: scale(0.98); }
        .btn-tele { background: #0056b3; color: white; }
        .info-text { background: #1a1a2e; padding: 15px; border-radius: 10px; font-size: 14px; color: #4dfd63; border: 1px solid #4dfd63; margin-top: 15px; line-height: 1.5; }
        #status { font-size: 22px; font-weight: bold; margin: 10px 0; min-height: 30px; color: #f1c40f; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #e94560; margin: 0;">🎰 HRBOT</h1>
    <p style="font-size: 14px; opacity: 0.8;">"Dhaloota Harka Hin Laanne"</p>

    <div class="slot-box">
        <div id="s1">❓</div>
        <div id="s2">❓</div>
        <div id="s3">❓</div>
    </div>

    <div id="status">Qarshii qabsiisaa!</div>

    <input type="number" id="betAmt" placeholder="Hamma Qarshii (ETB)" min="10">

    <button class="btn btn-play" onclick="startSpin()">TAPHA JALQABI</button>
    <button class="btn btn-tele" onclick="payTele()">TELEBIRR-IIN KAFFALI</button>

    <div class="info-text">
        📢 <b>Hubachiisa:</b><br>
        Kaffaltii raawwattanii lakkoofsa <b>0902348040</b> irratti <b>Screenshot</b> nuuf ergaa.
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const items = ['🍎', '💎', '⭐', '🔔', '7️⃣'];

    function startSpin() {
        let amt = document.getElementById('betAmt').value;
        if(amt < 10 || amt == "") {
            tg.showAlert("Maaloo, dura qarshii 10 fi isaa ol qabsiisaa!");
            return;
        }

        document.getElementById('status').innerText = "Naanna'aa jira...";
        let count = 0;
        let timer = setInterval(() => {
            document.getElementById('s1').innerText = items[Math.floor(Math.random()*5)];
            document.getElementById('s2').innerText = items[Math.floor(Math.random()*5)];
            document.getElementById('s3').innerText = items[Math.floor(Math.random()*5)];
            count++;
            if(count > 12) {
                clearInterval(timer);
                checkWin(amt);
            }
        }, 100);
    }

    function checkWin(amt) {
        let a = document.getElementById('s1').innerText;
        let b = document.getElementById('s2').innerText;
        let c = document.getElementById('s3').innerText;

        if(a === b && b === c) {
            document.getElementById('status').innerText = "🎉 MOOTEETTA!";
            document.getElementById('status').style.color = "#4dfd63";
            tg.showAlert("Gammachuu Guddaa! Mooteetta. Screenshot kaasuun 0902348040 irratti nuuf ergi.");
        } else {
            document.getElementById('status').innerText = "❌ HIN MOONNE";
            document.getElementById('status').style.color = "#ff4d4d";
            setTimeout(() => { 
                document.getElementById('status').innerText = "Irra deebi'ii yaali";
                document.getElementById('status').style.color = "#f1c40f"; 
            }, 2000);
        }
    }

    function payTele() {
        tg.showPopup({
            title: 'Kaffaltii Telebirr',
            message: 'Lakkoofsa 0902348040 irratti kaffaltii raawwachuuf gara Telebirr si geessu?',
            buttons: [{id: 'ok', type: 'default', text: 'Eeyyee'}]
        }, (id) => {
            if(id === 'ok') {
                window.open("https://www.ethiotelecom.et/telebirr/", "_blank");
            }
        });
    }
</script>

</body>
</html>
